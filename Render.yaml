# ─────────────────────────────────────────────────────────────
# PROYECTO: Sistema de Gestión de Ínfimas - Compras Públicas
# Zona horaria: Ecuador (ECT) = UTC-5
# Conversión: Hora Ecuador + 5 = Hora UTC
# ─────────────────────────────────────────────────────────────

services:

  # GRUPO 1: Scripts 1 al 4 (cada 75 minutos, lunes-viernes)

  - type: cron
    name: infimas-09h00
    runtime: python
    schedule: "0 14 * * 1-5"        # 9:00 AM Ecuador (14:00 UTC)
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y chromium chromium-driver
    startCommand: python main_Recoleccion.py
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DATABASE
        sync: false
      - key: BUCKET_NAME
        sync: false
      - key: RENDER_CRENDENTIALS_JSON
        sync: false

