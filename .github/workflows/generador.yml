name: Generador de Documentos de Infimas

on:
  schedule:
    # Horario Ecuador (UTC-5)
    # Ejecutar cada 2 horas entre 8am y 4pm, Lunes a Viernes
    # 8am (13 UTC), 10am (15 UTC), 12pm (17 UTC), 2pm (19 UTC), 4pm (21 UTC)
    - cron: '0 13,15,17,19,21 * * 1-5'
  workflow_dispatch:  # Permite ejecución manual

jobs:
  generar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias Python
        run: |
          pip install -r requirements.txt
      
      - name: Ejecutar generador
        run: python main_generacion.py
        env:
          # Variables de entorno
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DATABASE: ${{ secrets.DATABASE }}
          CREDENTIALS_GEMINI: ${{ secrets.CREDENTIALS_GEMINI }}
          RENDER_CRENDENTIALS_JSON: ${{ secrets.RENDER_CRENDENTIALS_JSON }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          GEMINI_CREDENTIALS: ${{ secrets.GEMINI_CREDENTIALS }}
          PYTHONUNBUFFERED: 1