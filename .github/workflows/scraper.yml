#RECOLECTOR DE INFIMAS 
name: Scraper de Gestorex Recoleccion

on:
  schedule:
    # Horario Ecuador (UTC-5)
    # 8:30am, 9:30am, 10:30am, 11:30am, 12:30pm, 1:30pm, 2:30pm, 3:30pm, 4:30pm
    # (13:30, 14:30, 15:30, 16:30, 17:30, 18:30, 19:30, 20:30, 21:30 UTC)
    - cron: '30 13-21 * * 1-5'   
  workflow_dispatch:  # Permite ejecución manual

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium chromium-driver
      
      - name: Instalar dependencias Python
        run: |
          pip install -r requirements.txt
      
      - name: Ejecutar Recoleccion
        run: python main_Recoleccion.py
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DATABASE: ${{ secrets.DATABASE }}
          CREDENTIALS_GEMINI: ${{ secrets.CREDENTIALS_GEMINI }}
          RENDER_CRENDENTIALS_JSON: ${{ secrets.RENDER_CRENDENTIALS_JSON }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          TMPDIR: /tmp
          TMP: /tmp
          PYTHONUNBUFFERED: 1
