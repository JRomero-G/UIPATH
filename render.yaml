# ─────────────────────────────────────────────────────────────
# PROYECTO: Sistema de Gestión de Ínfimas - Compras Públicas
# Zona horaria: Ecuador (ECT) = UTC-5
# Runtime: Docker
# ─────────────────────────────────────────────────────────────

